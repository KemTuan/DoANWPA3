version: '3.8'
services:
  monitor:
    build: .
    volumes:
      - ./data:/app/data
    command: python3 -c "from monitor import run; run()" # Script giám sát theo thời gian thực

  attacker:
    build: .
    volumes:
      - ./data:/app/data
    # Attacker chỉ chạy kịch bản rồi thoát
    command: python3 -c "from simulator import Wpa3AttackSimulator; s=Wpa3AttackSimulator('target_mac'); s.run_deauth_test()"